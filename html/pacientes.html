<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="../img/logo.svg" />
  <title>IUB HealthCare</title>
  <link rel="stylesheet" href="../css/app.css" />
  <link rel="stylesheet" href="../css/pacientes.css" />
</head>
<body>

  <!-- ====== SIDEBAR ====== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icono"></div>
      <span><span class="logo-texto">IUB</span> HealthCare</span>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <script src="../js/sidebar.js"></script>
    </nav>

    <div class="sidebar-footer">
      <div class="logout-icon-wrap">
        <img src="../img/logout.svg" alt="" class="logout-default" />
        <img src="../img/logout_hover.svg" alt="" class="logout-hover" />
      </div>
      Cerrar sesión
    </div>
  </aside>

  <!-- ====== CONTENIDO PRINCIPAL ====== -->
  <main class="main">

    <header class="topbar">
      <div class="topbar-titulo">
        <h1>Gestión de Pacientes</h1>
      </div>
      <div class="topbar-usuario">
        <img src="../img/usuario.svg" alt="Usuario" class="nav-icon" />
        <span id="topbar-nombre"></span>
      </div>
    </header>

    <div class="pacientes-page">

      <!-- Cabecera: buscador + botón nuevo paciente -->
      <div class="pac-cabecera">
        <h2 class="pac-titulo">Listado de pacientes</h2>
        <div class="pac-controles">
          <div class="pac-buscador">
            <i class="fa fa-search pac-buscador-icon"></i>
            <input type="text" id="input-buscar" placeholder="Buscar por nombre, apellido o documento…" />
          </div>
          <button class="btn-nuevo-pac" id="btn-nuevo-paciente">+ Nuevo paciente</button>
        </div>
      </div>

      <!-- Tabla de pacientes -->
      <div class="pac-tabla-wrap">
        <table class="pac-tabla">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre completo</th>
              <th>Documento</th>
              <th>Diagnóstico</th>
              <th>Estado cama</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-body">
            <tr>
              <td colspan="6" class="pac-cargando">Cargando pacientes…</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>

    <footer class="pie">
      <span>Barranquilla, Colombia — 2026</span>
      <span>Desarrollado por: <a href="#">V. Martínez, F. Garrido</a></span>
    </footer>

  </main>

  <!-- ====== MODAL ====== -->
  <div id="modal-overlay" class="modal-overlay oculto">
    <div class="modal-caja">
      <div class="modal-cabecera">
        <span id="modal-titulo">Acción</span>
        <button id="btn-cerrar-modal" class="modal-btn-cerrar">✕</button>
      </div>
      <div id="modal-cuerpo"></div>
      <div class="modal-pie">
        <button id="btn-cancelar-modal" class="modal-btn-cancelar">Cancelar</button>
        <button id="btn-confirmar" class="modal-btn-confirmar">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="../js/database.js"></script>
  <script src="../js/pacientes.js"></script>

</body>
</html>
