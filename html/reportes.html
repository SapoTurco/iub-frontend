<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="../img/logo.svg" />
  <title>IUB HealthCare</title>
  <link rel="stylesheet" href="../css/app.css" />
  <link rel="stylesheet" href="../css/reportes.css" />
</head>
<body>

  <!-- Botón hamburguesa (visible solo en móvil) -->
  <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
    <span></span><span></span><span></span>
  </button>
  <!-- Overlay para cerrar sidebar -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ====== SIDEBAR ====== -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icono"></div>
      <span><span class="logo-texto">IUB</span> HealthCare</span>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <script src="../js/sidebar.js"></script>
    </nav>
    <div class="sidebar-footer">
      <div class="logout-icon-wrap">
        <img src="../img/logout.svg" alt="" class="logout-default" />
        <img src="../img/logout_hover.svg" alt="" class="logout-hover" />
      </div>
      Cerrar sesión
    </div>
  </aside>

  <!-- ====== CONTENIDO ====== -->
  <main class="main">

    <header class="topbar">
      <div class="topbar-titulo"><h1>Reportes clínicos</h1></div>
      <div class="topbar-usuario">
        <img src="../img/usuario.svg" alt="Usuario" class="nav-icon" />
        <span id="topbar-nombre"></span>
      </div>
    </header>

    <div class="reportes-page">

      <!-- Cabecera: filtros + botón nuevo reporte -->
      <div class="rep-cabecera">
        <h2 class="rep-titulo">Listado de reportes</h2>
        <div class="rep-controles">
          <div class="rep-buscador">
            <i class="fa fa-search rep-buscador-icon"></i>
            <input type="text" id="input-buscar" placeholder="Buscar por paciente…" />
          </div>
          <select id="select-tipo-filtro" class="rep-select-filtro">
            <option value="">Todos los tipos</option>
            <option value="MEDICO">Médico</option>
            <option value="OBSERVACION">Observación</option>
            <option value="INGRESO">Ingreso</option>
            <option value="ALTA">Alta</option>
          </select>
          <button class="btn-nuevo-rep" id="btn-nuevo-reporte">+ Nuevo reporte</button>
        </div>
      </div>

      <!-- Tabla de reportes -->
      <div class="rep-tabla-wrap">
        <table class="rep-tabla">
          <thead>
            <tr>
              <th>#</th>
              <th>Tipo</th>
              <th>Paciente</th>
              <th>Contenido</th>
              <th>Autor</th>
              <th>Fecha</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-body">
            <tr>
              <td colspan="7" class="rep-cargando">Cargando reportes…</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>

    <footer class="pie">
      <span>Barranquilla, Colombia — 2026</span>
      <span>Desarrollado por: <a href="#">V. Martínez, F. Garrido</a></span>
    </footer>

  </main>

  <!-- ====== MODAL ====== -->
  <div id="modal-overlay" class="modal-overlay oculto">
    <div class="modal-caja">
      <div class="modal-cabecera">
        <span id="modal-titulo">Acción</span>
        <button id="btn-cerrar-modal" class="modal-btn-cerrar">✕</button>
      </div>
      <div id="modal-cuerpo"></div>
      <div class="modal-pie">
        <button id="btn-cancelar-modal" class="modal-btn-cancelar">Cancelar</button>
        <button id="btn-confirmar" class="modal-btn-confirmar">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="../js/database.js"></script>
  <script src="../js/reportes.js"></script>

</body>
</html>
